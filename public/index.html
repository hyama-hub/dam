<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>埼玉県のダム 貯水状況</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1923;
    --panel: #182733;
    --line: #2a3d4d;
    --text: #e8f0f6;
    --muted: #8aa3b5;
    --water: #2e9fd8;
    --accent: #5ec8f2;
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Hiragino Sans", "Noto Sans JP", sans-serif;
    padding: 24px 16px 48px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 8px 16px; }
  header h1 { font-size: 26px; }
  header .sub { color: var(--muted); font-size: 13px; width: 100%; margin-top: 4px; }
  .dam-select {
    margin-left: auto; background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 8px 12px; font-size: 14px;
  }
  .grid { display: grid; grid-template-columns: 300px 1fr; gap: 16px; margin-top: 20px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 18px; }
  .tank-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
  .rate { font-size: 44px; font-weight: 700; color: var(--accent); line-height: 1; }
  .rate small { font-size: 18px; color: var(--muted); font-weight: 400; }
  .rate-note { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
  .card { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; }
  .card .label { font-size: 12px; color: var(--muted); }
  .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; }
  .card .unit { font-size: 12px; color: var(--muted); }
  .chart-panel { margin-top: 16px; }
  .chart-panel h2 { font-size: 15px; margin-bottom: 12px; }
  .chart-box { position: relative; height: 220px; }
  .chart-box.small { height: 180px; }
  footer { margin-top: 24px; color: var(--muted); font-size: 12px; line-height: 1.7; }
  footer a { color: var(--accent); }
  #status { color: var(--muted); margin-top: 40px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title">ダム 貯水状況</h1>
    <select id="damSelect" class="dam-select" aria-label="ダムを選択"></select>
    <div class="sub" id="meta">読み込み中…</div>
  </header>

  <div id="status">データを取得しています…</div>

  <div id="content" style="display:none">
    <div class="grid">
      <div class="panel">
        <div class="tank-title">貯水率（有効貯水容量比）</div>
        <div class="rate"><span id="rate">--</span><small> %</small></div>
        <div class="rate-note">有効貯水容量 <span id="capEff">--</span> 千m³</div>
        <!-- 貯水位を基準水位とともに表示するゲージ -->
        <svg id="gauge" viewBox="0 0 300 240" style="width:100%; margin-top:14px; overflow:visible"></svg>
      </div>
<img src="https://smetrics.diners.co.jp/b/ss/sumitclub2018dev/1/s234234238479?AQB=1&v70=2342384&v71=会員&events=event170&AQE=1"/>
      <div class="panel">
        <div class="cards">
          <div class="card"><div class="label">貯水量</div><div class="value" id="storage">--</div><div class="unit">千m³</div></div>
          <div class="card"><div class="label">貯水位</div><div class="value" id="level">--</div><div class="unit" id="levelUnit">EL.m</div></div>
          <div class="card"><div class="label">流入量</div><div class="value" id="inflow">--</div><div class="unit">m³/s</div></div>
          <div class="card"><div class="label">放流量</div><div class="value" id="outflow">--</div><div class="unit">m³/s</div></div>
        </div>
        <div class="chart-panel">
          <h2>貯水量の推移（過去24時間）</h2>
          <div class="chart-box small"><canvas id="storageChart"></canvas></div>
        </div>
      </div>
    </div>

    <div class="panel chart-panel">
      <h2>流入量・放流量の推移（過去24時間）</h2>
      <div class="chart-box"><canvas id="flowChart"></canvas></div>
    </div>
  </div>

  <footer>
    出典: <a id="sourceLink" href="https://suibo-river.pref.saitama.lg.jp/" target="_blank">埼玉県 川の防災情報</a>（約10分毎更新）。
    貯水率は「貯水量÷有効貯水容量」の独自計算値で、公式発表値とは異なる場合があります。
    本ページは非公式の可視化ツールです。防災判断には必ず公式情報を参照してください。
  </footer>
</div>

<script>
const fmt = (n, digits = 0) =>
  n == null ? '--' : n.toLocaleString('ja-JP', { minimumFractionDigits: digits, maximumFractionDigits: digits });

let storageChart, flowChart;

// 基準水位ゲージを描画（基準水位データが揃わない調節池等は貯水率で塗りつぶし）
function drawGauge(d) {
  const X0 = 24, X1 = 150, Y0 = 16, Y1 = 214; // 貯水池の枠（右側にラベル余白を確保）
  const L = d.levels || {};
  // 表示する基準水位（名称・値・色）。欠損は除外。
  const markers = [
    { key: 'kouzuijiSaikou', name: '洪水時最高水位', color: '#f25e6b' },
    { key: 'joujiMansui',    name: '常時満水位',     color: '#5ec8f2' },
    { key: 'heijoujiSaikou', name: '平常時最高貯水位', color: '#5ec8f2' },
    { key: 'kakiSeigen',     name: '夏季制限水位',   color: '#e8c35e' },
    { key: 'yobiHouryuu',    name: '予備放流水位',   color: '#9aa7b3' },
    { key: 'saitei',         name: '最低水位',       color: '#6f8597' },
  ].filter(m => L[m.key] != null);

  const top = L.teichou ?? Math.max(...markers.map(m => L[m.key]), d.level ?? 0);
  const bottom = L.saitei ?? Math.min(...markers.map(m => L[m.key]), d.level ?? 0);
  const hasScale = markers.length >= 2 && top > bottom;
  const elToY = el => Y1 - ((el - bottom) / (top - bottom)) * (Y1 - Y0);

  const svg = document.getElementById('gauge');
  const parts = [];
  // ダム堤体（右側の三角）と貯水池の枠
  parts.push(`<polygon points="${X1},${Y0} ${X1 + 28},${Y1} ${X1},${Y1}" fill="#4a5d6c"/>`);
  parts.push(`<rect x="${X0}" y="${Y0}" width="${X1 - X0}" height="${Y1 - Y0}" fill="#0a141c" stroke="${'#2a3d4d'}"/>`);

  // 水面のy座標
  let waterY;
  if (hasScale && d.level != null) {
    waterY = Math.min(Y1, Math.max(Y0, elToY(d.level)));
  } else {
    const rate = d.effectiveCapacity ? Math.min(d.storage / d.effectiveCapacity, 1) : 0;
    waterY = Y1 - rate * (Y1 - Y0);
  }
  parts.push(`<rect x="${X0}" y="${waterY}" width="${X1 - X0}" height="${Y1 - waterY}" fill="var(--water)" opacity="0.85"/>`);

  // 基準水位のマーカー（重なり回避のためラベルyをずらす）
  if (hasScale) {
    const seen = [];
    let lastLabelY = -99;
    // 上から順に
    const sorted = [...markers].sort((a, b) => L[b.key] - L[a.key]);
    for (const m of sorted) {
      const v = L[m.key];
      if (seen.some(s => Math.abs(s - v) < 0.05)) continue; // 同値（常時満水位＝平常時最高など）は1本に
      seen.push(v);
      const y = elToY(v);
      parts.push(`<line x1="${X0}" y1="${y}" x2="${X1}" y2="${y}" stroke="${m.color}" stroke-width="1" stroke-dasharray="3 3" opacity="0.8"/>`);
      let ly = y;
      if (ly - lastLabelY < 13) ly = lastLabelY + 13; // ラベル衝突回避
      lastLabelY = ly;
      parts.push(`<text x="${X1 + 6}" y="${ly + 3}" font-size="9" fill="${m.color}">${m.name} ${fmt(v, 1)}</text>`);
    }
  }

  // 現在の貯水位ライン
  if (d.level != null) {
    parts.push(`<line x1="${X0}" y1="${waterY}" x2="${X1}" y2="${waterY}" stroke="var(--accent)" stroke-width="2"/>`);
    parts.push(`<text x="${X0 + 4}" y="${waterY - 4}" font-size="11" font-weight="bold" fill="#dff1fb">現在 ${fmt(d.level, 2)} ${d.unit || 'EL'}.m</text>`);
  }
  if (!hasScale) {
    parts.push(`<text x="${X0 + 4}" y="${Y1 + 16}" font-size="10" fill="var(--muted)">※基準水位データなし（貯水率で表示）</text>`);
  }
  svg.innerHTML = parts.join('');
}

const commonChartOpts = () => ({
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  scales: {
    x: { ticks: { color: '#8aa3b5', maxTicksLimit: 8 }, grid: { color: '#22323f' } },
    y: { ticks: { color: '#8aa3b5' }, grid: { color: '#22323f' } },
  },
  plugins: { legend: { labels: { color: '#e8f0f6' } } },
});

function render(d) {
  document.getElementById('title').textContent = `${d.name} 貯水状況`;
  document.title = `${d.name} 貯水状況`;
  document.getElementById('meta').textContent =
    `${d.river} ／ ${d.location} ／ 観測時刻 ${d.observedAt ?? '—'}`;
  document.getElementById('sourceLink').href =
    `https://suibo-river.pref.saitama.lg.jp/damDetail.html?ccd=${d.ccd}`;

  const rate = d.effectiveCapacity ? (d.storage / d.effectiveCapacity) * 100 : null;
  document.getElementById('rate').textContent = rate == null ? '--' : rate.toFixed(1);
  document.getElementById('capEff').textContent = fmt(d.effectiveCapacity);
  document.getElementById('storage').textContent = fmt(d.storage);
  document.getElementById('level').textContent = fmt(d.level, 2);
  document.getElementById('levelUnit').textContent = `${d.unit || 'EL'}.m`;
  document.getElementById('inflow').textContent = fmt(d.inflow, 2);
  document.getElementById('outflow').textContent = fmt(d.outflow, 2);

  drawGauge(d);

  const labels = d.series.map(p => p.time);
  storageChart?.destroy();
  storageChart = new Chart(document.getElementById('storageChart'), {
    type: 'line',
    data: { labels, datasets: [{
      label: '貯水量（千m³）', data: d.series.map(p => p.storage),
      borderColor: '#5ec8f2', backgroundColor: 'rgba(46,159,216,0.25)',
      fill: true, tension: 0.3, pointRadius: 0,
    }] },
    options: commonChartOpts(),
  });

  flowChart?.destroy();
  flowChart = new Chart(document.getElementById('flowChart'), {
    type: 'line',
    data: { labels, datasets: [
      { label: '流入量（m³/s）', data: d.series.map(p => p.inflow), borderColor: '#6fd692', tension: 0.3, pointRadius: 0 },
      { label: '放流量（m³/s）', data: d.series.map(p => p.outflow), borderColor: '#f2a65e', tension: 0.3, pointRadius: 0 },
    ] },
    options: commonChartOpts(),
  });

  document.getElementById('status').style.display = 'none';
  document.getElementById('content').style.display = '';
}

async function load(ccd) {
  document.getElementById('status').style.display = '';
  document.getElementById('status').textContent = 'データを取得しています…';
  const res = await fetch('/api/dam' + (ccd ? `?ccd=${encodeURIComponent(ccd)}` : ''));
  if (!res.ok) throw new Error('API error');
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  if (ccd) location.hash = ccd;
  render(d);
}

async function init() {
  // ダム選択プルダウンを構築
  const sel = document.getElementById('damSelect');
  try {
    const list = await (await fetch('/api/dams')).json();
    sel.innerHTML = list.map(d => `<option value="${d.ccd}">${d.name}（${d.river}）</option>`).join('');
  } catch { /* 一覧が取れなくても既定ダムは表示する */ }

  const initial = location.hash.replace('#', '') || '12331400006'; // 既定: 下久保ダム
  if (sel.querySelector(`option[value="${initial}"]`)) sel.value = initial;
  sel.addEventListener('change', () => load(sel.value).catch(showError));

  await load(sel.value || initial);
}

function showError(e) {
  const s = document.getElementById('status');
  s.style.display = '';
  s.textContent = `データの取得に失敗しました: ${e.message}`;
}

init().catch(showError);
</script>
</body>
</html>
